---
# tasks file for eterrors

- name: Create application directory
  ansible.builtin.file:
    path: /var/tmp/pciedegraded
    state: directory
    mode: '0755'

- name: Deploy eterrors.py script
  ansible.builtin.copy:
    src: pciedegraded.py
    dest: /var/tmp/pciedegraded/
    mode: '0755'

- name: Find old eterrors JSON files for cleanup
  ansible.builtin.find:
    paths: /var/tmp/pciedegraded
    patterns: "*pciedegraded-*.json"
  register: old_logs

- name: Remove old files from remote host
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ old_logs.files }}"

- name: Execute pciedegraded script
  ansible.builtin.shell:
    cmd: python3 pciedegraded.py
    chdir: /var/tmp/pciedegraded
  register: pciedegraded_run
  changed_when: true

- name: Find the generated eterrors JSON result file
  ansible.builtin.find:
    paths: /var/tmp/pciedegraded
    patterns: "*pciedegraded-*.json"
  register: found_results

- name: Fetch JSON result files back to the controller
  ansible.builtin.fetch:
    src: "{{ item.path }}"
    dest: "{{ role_path }}/files/logs/"
    flat: yes
  loop: "{{ found_results.files }}"
