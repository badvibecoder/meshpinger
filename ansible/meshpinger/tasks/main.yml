---
# tasks file for meshpinger
- name: Install pip on Debian/Ubuntu
  ansible.builtin.apt:
    name: python3-pip
    state: present
    update_cache: yes
  become: yes

- name: Install PyYAML using pip
  ansible.builtin.pip:
    name: PyYAML
    state: present
    break_system_packages: yes
  # Note: If deploying to the air-gapped nodes, replace the above task 
  # with the .whl copy/install method

- name: Create application directory
  ansible.builtin.file:
    path: /var/tmp/meshpinger
    state: directory
    mode: '0755'

- name: Deploy meshpinger files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /var/tmp/meshpinger/
    mode: '0755'
  loop:
    - meshpinger.py
    - nodes.yaml

- name: Find old log and JSON files for cleanup
  ansible.builtin.find:
    paths: /var/tmp/meshpinger
    patterns: 
      - "*pingtest-*.log"
      - "*pingtest-*.json"
  register: old_logs

- name: Remove old files from remote host
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ old_logs.files }}"

- name: Execute meshpinger script
  ansible.builtin.shell:
    cmd: python3 meshpinger.py --yaml nodes.yaml
    chdir: /var/tmp/meshpinger
  register: meshpinger_run
  changed_when: true

- name: Find the generated JSON result file
  ansible.builtin.find:
    paths: /var/tmp/meshpinger
    patterns: "*pingtest-*.json"
  register: found_results

- name: Fetch JSON result files back to the controller
  ansible.builtin.fetch:
    src: "{{ item.path }}"
    dest: "{{ role_path }}/files/logs/"
    flat: yes
  loop: "{{ found_results.files }}"