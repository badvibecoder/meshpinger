---
- name: Ensure Python 3 venv and pip are installed
  ansible.builtin.apt:
    name: 
      - python3-pip
      - python3-venv  # Required for the pip virtualenv command
    state: present
    update_cache: yes
  become: yes

- name: Create application directory
  ansible.builtin.file:
    path: /var/tmp/meshpinger
    state: directory
    mode: '0755'

- name: Install PyYAML in a virtual environment
  ansible.builtin.pip:
    name: PyYAML
    virtualenv: /var/tmp/meshpinger/venv
    virtualenv_command: python3 -m venv

- name: Deploy meshpinger files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /var/tmp/meshpinger/
    mode: '0755'
  loop:
    - meshpinger.py
    - nodes.yaml

- name: Find old log and JSON files for cleanup
  ansible.builtin.find:
    paths: /var/tmp/meshpinger
    patterns: 
      - "*pingtest-*.log"
      - "*pingtest-*.json"
  register: old_logs

- name: Remove old files from remote host
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ old_logs.files }}"

- name: Execute meshpinger script using venv
  ansible.builtin.shell:
    # Call the python binary inside the venv directly
    cmd: ./venv/bin/python3 meshpinger.py --yaml nodes.yaml --fail-only
    chdir: /var/tmp/meshpinger
  register: meshpinger_run
  changed_when: true

- name: Find the generated JSON result file
  ansible.builtin.find:
    paths: /var/tmp/meshpinger
    patterns: "*pingtest-*.json"
  register: found_results

- name: Fetch JSON result files back to the controller
  ansible.builtin.fetch:
    src: "{{ item.path }}"
    dest: "{{ role_path }}/files/logs/"
    flat: yes
  loop: "{{ found_results.files }}"
